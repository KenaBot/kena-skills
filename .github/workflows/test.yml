name: test

# Manual only — the user runs this from the Actions tab or via
# `gh workflow run test.yml`. Nothing runs on push or pull_request.
on:
  workflow_dispatch:
    inputs:
      run_bash_tests:
        description: 'Run bash test suite (Linux + macOS + Windows)'
        required: false
        default: 'true'
      run_powershell_tests:
        description: 'Run PowerShell wrapper test (Windows only)'
        required: false
        default: 'true'
      run_shellcheck:
        description: 'Run shellcheck lint (Linux + macOS)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------
  # Bash test suite (Linux, macOS, Windows via Git Bash, WSL)
  # ----------------------------------------------------------------------
  test-bash:
    name: bash tests (${{ matrix.os }})
    if: inputs.run_bash_tests == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git Bash (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Git for Windows includes Git Bash; verify it's on PATH
          $bash = Get-Command bash.exe -ErrorAction SilentlyContinue
          if (-not $bash) {
            Write-Host "::error::bash.exe not found on PATH"
            exit 1
          }
          Write-Host "Git Bash found: $($bash.Source)"

      - name: Run bash test suite
        run: |
          bash installer/tests/run-all.sh

      - name: Syntax check all shell scripts
        run: |
          for f in installer/kena-skills installer/install.sh installer/lib/*.sh installer/tests/*.sh installer/templates/*.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done

      - name: Smoke test --list
        run: |
          bash installer/kena-skills --list

      - name: Smoke test --help
        run: |
          bash installer/kena-skills --help

      - name: Smoke test --all --dry-run
        run: |
          bash installer/kena-skills --all --target opencode --dry-run --no-tui

  # ----------------------------------------------------------------------
  # PowerShell wrapper test (Windows only)
  # ----------------------------------------------------------------------
  test-powershell:
    name: powershell wrapper (windows-latest)
    if: inputs.run_powershell_tests == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate install.ps1 syntax
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            'installer/install.ps1', [ref]$tokens, [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "::error::$($_.Message)" }
            exit 1
          }
          Write-Host "install.ps1 syntax OK"

      - name: Validate install.cmd syntax (basic check)
        run: |
          if (-not (Test-Path 'installer/install.cmd')) {
            Write-Host "::error::install.cmd not found"
            exit 1
          }
          $content = Get-Content 'installer/install.cmd' -Raw
          if ($content -notmatch '@echo off') {
            Write-Host "::error::install.cmd missing @echo off"
            exit 1
          }
          Write-Host "install.cmd OK"

      - name: Test install.ps1 -Help
        run: |
          pwsh -File installer/install.ps1 -Help

      - name: Test install.ps1 runtime detection
        run: |
          # The wrapper should detect Git Bash on windows-latest
          pwsh -File installer/install.ps1 -Help | Select-String -Pattern "Git Bash" -SimpleMatch
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::install.ps1 help doesn't mention Git Bash"
            exit 1
          }

  # ----------------------------------------------------------------------
  # ShellCheck lint (MANUAL ONLY — run via Actions tab or workflow_dispatch)
  # Disabled by default because ludeeus/action-shellcheck@2.0.0 ignores
  # configuration still emits warnings on inherited bash code, and we don't
  # want to gate push/PR on those. To run lint: Actions tab > test >
  # Run workflow > run_shellcheck=true.
  # ----------------------------------------------------------------------
  lint-shellcheck:
    name: shellcheck (${{ matrix.os }})
    if: inputs.run_shellcheck == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./installer
          additional_files: install.sh kena-skills
          ignore_names: SC1091,SC2086,SC2155,SC2046,SC2034,SC2295,SC2004,SC2094

  # ----------------------------------------------------------------------
  # Final summary
  # ----------------------------------------------------------------------
  all-passed:
    name: summary
    runs-on: ubuntu-latest
    needs: [test-bash, test-powershell, lint-shellcheck]
    if: ${{ always() }}
    steps:
      - name: Summarize results
        run: |
          echo "=== CI summary ==="
          echo "test-bash (Linux/macOS/Windows):     ${{ needs.test-bash.result }}"
          echo "test-powershell (Windows wrapper):   ${{ needs.test-powershell.result }}"
          echo "lint-shellcheck (Linux/macOS lint):  ${{ needs.lint-shellcheck.result }}"
          echo ""
          # Fail only if a job that actually ran failed.
          if [ "${{ needs.test-bash.result }}" = "failure" ] || [ "${{ needs.test-bash.result }}" = "cancelled" ]; then
            echo "::error::test-bash failed"
            exit 1
          fi
          if [ "${{ needs.test-powershell.result }}" = "failure" ] || [ "${{ needs.test-powershell.result }}" = "cancelled" ]; then
            echo "::error::test-powershell failed"
            exit 1
          fi
          if [ "${{ needs.lint-shellcheck.result }}" = "failure" ]; then
            echo "::error::lint-shellcheck failed"
            exit 1
          fi
          echo "✓ CI completed (jobs marked 'skipped' were not requested)"
